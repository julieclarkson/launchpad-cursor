<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="pitch-deck_{{PROJECT_SLUG}}.css">
</head>
<body>
  <main class="pitch-deck">
    <h1>{{HEADLINE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <section class="problem">
      <h2>{{PROBLEM_HEADING}}</h2>
      <p>{{PROBLEM_BODY}}</p>
    </section>
    <section class="solution">
      <h2>{{SOLUTION_HEADING}}</h2>
      <p>{{SOLUTION_BODY}}</p>
    </section>
    <section class="cta">
      <p>{{CTA_TEXT}}</p>
      <a href="{{CTA_URL}}"{{CTA_ATTRS}}>{{CTA_LABEL}}</a>
    </section>
  </main>
</body>
</html>
