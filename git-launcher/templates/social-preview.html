<!--
  Social Preview Template
  Used by image-generator.js as the base layout for OG images.
  Variables: {{title}}, {{subtitle}}, {{color}}, {{tech}}
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'none'; script-src 'none'; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, {{color}}, {{colorDark}});
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: white;
    text-align: center;
    padding: 60px;
  }
  h1 {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  p.subtitle {
    font-size: 28px;
    opacity: 0.85;
    margin-bottom: 40px;
  }
  .divider {
    width: 120px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    margin-bottom: 40px;
  }
  p.tech {
    font-family: monospace;
    font-size: 18px;
    opacity: 0.6;
    position: absolute;
    bottom: 40px;
  }
</style>
</head>
<body>
  <h1>{{title}}</h1>
  <p class="subtitle">{{subtitle}}</p>
  <div class="divider"></div>
  <p class="tech">{{tech}}</p>
</body>
</html>
